services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bancodb
      POSTGRES_USER: bancouser
      POSTGRES_PASSWORD: bancopass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./BaseDatos.sql:/docker-entrypoint-initdb.d/BaseDatos.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bancouser -d bancodb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bancodb
      SPRING_DATASOURCE_USERNAME: bancouser
      SPRING_DATASOURCE_PASSWORD: bancopass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: